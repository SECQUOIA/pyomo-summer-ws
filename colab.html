<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open in Colab</title>
  </head>
  <body>
    <p>Redirecting to Colab...</p>
    <p>
      If you are not redirected,
      <a href="https://colab.research.google.com/github/SECQUOIA/pyomo-summer-ws">
        open the repository in Colab
      </a>.
    </p>
    <script>
      (function () {
        const fallback = "https://colab.research.google.com/github/SECQUOIA/pyomo-summer-ws";
        const colabBlobBase = "https://colab.research.google.com/github/SECQUOIA/pyomo-summer-ws/blob/main/";
        const map = {
          "notebooks/python/python-exercises": "notebooks/python/python-exercises.ipynb",
          "notebooks.python.python-exercises": "notebooks/python/python-exercises.ipynb",
          "notebooks/pyomofundamentals/fundamentals": "notebooks/PyomoFundamentals/Fundamentals.ipynb",
          "notebooks.pyomofundamentals.fundamentals": "notebooks/PyomoFundamentals/Fundamentals.ipynb",
          "notebooks/pyomononlinear/pyomononlinear": "notebooks/PyomoNonlinear/PyomoNonlinear.ipynb",
          "notebooks.pyomononlinear.pyomononlinear": "notebooks/PyomoNonlinear/PyomoNonlinear.ipynb"
        };

        const ref = document.referrer || "";
        if (!ref) {
          window.location.replace(fallback);
          return;
        }

        let refUrl;
        try {
          refUrl = new URL(ref);
        } catch (err) {
          window.location.replace(fallback);
          return;
        }

        let parts = refUrl.pathname.split("/").filter(Boolean);
        if (parts[0] === "pyomo-summer-ws") {
          parts = parts.slice(1);
        }

        if (parts.length === 0) {
          window.location.replace(fallback);
          return;
        }

        const last = parts[parts.length - 1].replace(/\.html$/i, "");
        if (last === "index") {
          parts = parts.slice(0, -1);
        } else {
          parts[parts.length - 1] = last;
        }

        if (parts.length === 0) {
          window.location.replace(fallback);
          return;
        }

        const keySlash = parts.join("/").toLowerCase();
        const keyDot = parts.join(".").toLowerCase();
        const nbPath = map[keySlash] || map[keyDot];
        if (!nbPath) {
          window.location.replace(fallback);
          return;
        }

        window.location.replace(colabBlobBase + nbPath);
      })();
    </script>
  </body>
</html>
