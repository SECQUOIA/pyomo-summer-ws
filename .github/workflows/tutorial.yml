name: deploy-book

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  schedule:
  - cron: "0 8 * * 1"

jobs:
  build-book:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: 3.11

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install docs dependencies
      run: |
        uv sync --locked --group docs

    - name: Run content tests
      run: |
        uv run --group docs python -m unittest discover -s tests

    - name: cache executed notebooks
      uses: actions/cache@v5
      with:
        path: _build/.jupyter_cache
        key: jupyter-book-cache-${{ hashFiles('uv.lock') }}

    - name: Build the book
      run: |
        uv run --group docs jupyter book build --html --ci
      env:
        BASE_URL: /pyomo-summer-ws

    - name: Write legacy redirects
      run: |
        uv run --group docs python tools/write_legacy_redirects.py

    - name: Check generated URLs
      run: |
        if grep -R --line-number --fixed-strings "/pyomo-summer-ws//" _build/html; then
          echo "Generated site contains doubled project base URLs" >&2
          exit 1
        fi

    - name: Check generated static site
      run: |
        uv run --group docs python tools/check_static_site.py

    - name: Upload artifact
      if: github.event_name == 'push'
      uses: actions/upload-pages-artifact@v5
      with:
        path: "_build/html"

  deploy-book:
    if: github.event_name == 'push'
    needs: build-book
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

  link-check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Check external links
      run: |
        python tools/check_external_links.py
